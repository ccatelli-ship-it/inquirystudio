<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inquiry Studio · Day 4 Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Familjen+Grotesk:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1f8fd6; --blue-d:#0f6bb1;
  --teal:#2ee0cf; --teal-d:#137c78;
  --green:#8fd97f; --coral:#ff9d78; --orange:#ffb43d; --amber:#ffd66b;
  --fg:#f2f6ff; --muted:#c2cee6;
  --line:rgba(255,255,255,.16);
  --glass:rgba(255,255,255,.06); --glass-2:rgba(255,255,255,.11);
  --font-d:'Boldonse',serif;
  --font-b:'Familjen Grotesk',sans-serif;
  --font-m:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--font-b);color:var(--fg);overflow:hidden;
  -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(ellipse 50% 42% at 10% 4%, rgba(46,224,207,.40), transparent 55%),
    radial-gradient(ellipse 55% 45% at 90% 0%, rgba(31,143,214,.50), transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 80%, rgba(143,217,127,.26), transparent 55%),
    radial-gradient(ellipse 55% 45% at 6% 94%, rgba(255,157,120,.28), transparent 55%),
    radial-gradient(ellipse 90% 60% at 50% 40%, rgba(60,90,180,.22), transparent 70%),
    linear-gradient(160deg, #1a2a5e 0%, #142353 48%, #0f1b41 100%);
  background-attachment:fixed;
}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7;
  background-image:
    radial-gradient(1.6px 1.6px at 12% 22%,#fff,transparent 60%),
    radial-gradient(1.3px 1.3px at 26% 81%,#fff,transparent 60%),
    radial-gradient(1.7px 1.7px at 41% 15%,#d6f5ff,transparent 60%),
    radial-gradient(1.3px 1.3px at 58% 64%,#fff,transparent 60%),
    radial-gradient(2.1px 2.1px at 71% 28%,#c8fff4,transparent 60%),
    radial-gradient(1.3px 1.3px at 86% 73%,#fff,transparent 60%),
    radial-gradient(1.3px 1.3px at 93% 12%,#fff,transparent 60%),
    radial-gradient(1.7px 1.7px at 8% 60%,#fff,transparent 60%),
    radial-gradient(1.3px 1.3px at 33% 45%,#fff,transparent 60%),
    radial-gradient(1.3px 1.3px at 64% 90%,#ffe6c7,transparent 60%);
  animation:tw 7s ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.4}100%{opacity:.85}}

/* progress bar */
.progress{position:fixed;top:0;left:0;height:3px;width:0;z-index:80;
  background:linear-gradient(90deg,var(--teal),var(--blue),var(--coral));transition:width .4s ease}

/* ====== Deck + slides ====== */
.deck{position:relative;z-index:1;height:100vh;height:100dvh}
.slide{position:absolute;inset:0;height:100vh;height:100dvh;overflow:hidden;
  display:none;flex-direction:column;justify-content:center;
  padding:clamp(20px,3.4vh,46px) clamp(24px,5vw,72px)}
.slide.active{display:flex}
.inner{width:min(95vw,1380px);margin:0 auto;max-height:94vh;width:min(95vw,1380px)}

/* reveal */
.r{opacity:0;transform:translateY(16px);transition:opacity .55s ease, transform .55s cubic-bezier(.2,.7,.2,1)}
.slide.active .r{opacity:1;transform:none}
.slide.active .r:nth-child(1){transition-delay:.05s}
.slide.active .r:nth-child(2){transition-delay:.13s}
.slide.active .r:nth-child(3){transition-delay:.21s}
.slide.active .r:nth-child(4){transition-delay:.29s}
.slide.active .r:nth-child(5){transition-delay:.37s}
.slide.active .r:nth-child(6){transition-delay:.45s}
.slide.active .r:nth-child(7){transition-delay:.53s}
.slide.active .r:nth-child(8){transition-delay:.61s}

/* shared type — LARGER than prior decks */
.kick{font-family:var(--font-m);font-size:clamp(12px,1.5vw,17px);letter-spacing:.26em;text-transform:uppercase;color:var(--teal);margin:0 0 clamp(14px,2vh,22px);display:flex;align-items:center;gap:12px}
.kick .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 5px rgba(46,224,207,.2);animation:pulse 1.8s ease-in-out infinite;flex:none}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.55}}
h1.s,h2.s{margin:0;font-family:var(--font-d);font-weight:400;text-transform:uppercase;letter-spacing:-.005em;
  padding-block:.1em;
  background:linear-gradient(180deg,#fff 0%,#fff 64%,#bcc8e4 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
h1.s{font-size:clamp(42px,6.4vw,88px);line-height:1.08}
h2.s{font-size:clamp(30px,4.9vw,64px);line-height:1.1}
.lead{color:var(--muted);font-size:clamp(20px,2.6vw,31px);line-height:1.5;margin:clamp(14px,2.2vh,24px) 0 0;max-width:52ch}
.accent{font-style:italic;
  background:linear-gradient(92deg,var(--amber),var(--orange) 40%,var(--coral) 72%,var(--teal));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.note{margin:clamp(16px,2.4vh,26px) 0 0;font-size:clamp(16px,1.9vw,22px);color:var(--muted);line-height:1.5}
.tagline{display:inline-block;margin-top:clamp(16px,2.4vh,26px);font-family:var(--font-m);font-size:clamp(14px,1.7vw,20px);letter-spacing:.08em;text-transform:uppercase;color:var(--amber)}

.card{background:var(--glass);border:1px solid var(--line);border-radius:18px;backdrop-filter:blur(8px)}

/* bullet lists */
ul.clean{list-style:none;margin:clamp(16px,2.6vh,30px) 0 0;padding:0;display:grid;gap:clamp(12px,1.8vh,18px)}
ul.clean li{position:relative;padding-left:36px;font-size:clamp(20px,2.4vw,28px);line-height:1.45;color:var(--fg)}
ul.clean li::before{content:"";position:absolute;left:0;top:.45em;width:14px;height:14px;border-radius:50%;
  background:var(--accent-c,var(--teal));box-shadow:0 0 14px var(--accent-c,var(--teal))}

/* grids of mini cards */
.grid{display:grid;gap:clamp(12px,1.7vw,20px);margin-top:clamp(18px,2.8vh,30px)}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.mini{padding:clamp(16px,2vw,26px);background:var(--glass);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(8px)}
.mini h4{margin:0 0 8px;font-family:var(--font-b);font-weight:700;font-size:clamp(20px,2.3vw,26px);color:#fff}
.mini p{margin:0;font-size:clamp(16px,1.9vw,22px);line-height:1.42;color:var(--muted)}
.mini .ic{width:clamp(32px,3.4vw,42px);height:clamp(32px,3.4vw,42px);margin-bottom:12px;color:var(--accent-c,var(--teal))}

svg.icon{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.badge{width:clamp(60px,7.5vw,98px);height:clamp(60px,7.5vw,98px);border-radius:24px;display:grid;place-items:center;color:#0f1b41;
  background:var(--accent-c,var(--teal));box-shadow:0 0 34px color-mix(in oklab,var(--accent-c,var(--teal)) 55%,transparent)}
.badge svg{width:54%;height:54%;stroke-width:2.2}

/* ===== title / hero ===== */
.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(20px,4vw,56px);align-items:center}
@media(max-width:860px){.hero{grid-template-columns:1fr}}
.brand{font-family:var(--font-d);font-weight:400;text-transform:uppercase;line-height:1.04;font-size:clamp(40px,6.6vw,92px);
  background:linear-gradient(180deg,#fff,#bcc8e4);-webkit-background-clip:text;background-clip:text;color:transparent;padding-block:.08em;margin:0}
.brandsub{font-family:var(--font-b);font-style:italic;font-weight:600;font-size:clamp(24px,3.4vw,44px);margin:.1em 0 0;
  background:linear-gradient(92deg,var(--amber),var(--coral) 55%,var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent}
.meta{font-family:var(--font-m);letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-size:clamp(13px,1.6vw,18px);margin-top:clamp(18px,2.6vh,28px)}
.daychip{display:inline-flex;align-items:center;gap:10px;margin-top:20px;padding:10px 20px;border-radius:999px;
  font-family:var(--font-m);letter-spacing:.14em;text-transform:uppercase;font-size:clamp(14px,1.7vw,19px);font-weight:600;
  color:#0f1b41;background:linear-gradient(92deg,var(--teal),var(--blue));box-shadow:0 0 28px rgba(46,224,207,.45)}
.focus{margin-top:18px;font-size:clamp(17px,2vw,24px);color:var(--fg)}
.focus b{color:var(--amber)}
.cat-stage{position:relative;justify-self:center;width:min(100%,420px);aspect-ratio:1/1;display:grid;place-items:center}
.cat-stage::before{content:"";position:absolute;inset:8%;border-radius:50%;
  background:radial-gradient(circle at 50% 45%,rgba(46,224,207,.5),rgba(31,143,214,.32) 45%,transparent 70%);filter:blur(12px)}
.cat-stage img{position:relative;width:74%;height:74%;object-fit:contain;filter:drop-shadow(0 18px 40px rgba(0,0,0,.45));z-index:2}
.orbits{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.spin{transform-origin:210px 210px;animation:spin 40s linear infinite}
.spin.rev{animation-duration:52s;animation-direction:reverse}.spin.fast{animation-duration:28s}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== section divider ===== */
.section-slide .inner{text-align:center}
.section-ic{width:clamp(64px,8vw,108px);height:clamp(64px,8vw,108px);margin:0 auto clamp(18px,2.6vh,30px);border-radius:28px;display:grid;place-items:center;
  color:#0f1b41;background:var(--accent-c,var(--teal));box-shadow:0 0 40px color-mix(in oklab,var(--accent-c,var(--teal)) 55%,transparent)}
.section-ic svg{width:52%;height:52%;stroke-width:2.2}
.section-slide h1.s{font-size:clamp(40px,7vw,96px)}
.section-slide .lead{margin-left:auto;margin-right:auto;text-align:center}

/* ===== from → to ===== */
.fromto{display:grid;grid-template-columns:1fr auto 1fr;gap:clamp(14px,2vw,26px);align-items:stretch;margin-top:clamp(20px,3vh,32px)}
@media(max-width:860px){.fromto{grid-template-columns:1fr}}
.ft{padding:clamp(18px,2.2vw,28px);border-radius:18px;border:1px solid var(--line);background:var(--glass)}
.ft .lab{font-family:var(--font-m);letter-spacing:.18em;text-transform:uppercase;font-size:clamp(12px,1.4vw,16px);margin-bottom:10px}
.ft.from .lab{color:var(--coral)} .ft.to .lab{color:var(--teal)}
.ft p{margin:0;font-size:clamp(18px,2.1vw,25px);line-height:1.4;color:var(--fg)}
.ft-arrow{display:grid;place-items:center;color:var(--amber)}
.ft-arrow svg{width:clamp(34px,4vw,52px);height:clamp(34px,4vw,52px)}
@media(max-width:860px){.ft-arrow{transform:rotate(90deg)}}

/* ===== stats ===== */
.statrow{display:flex;flex-wrap:wrap;gap:clamp(20px,4vw,60px);align-items:center;margin-top:clamp(16px,2.4vh,28px)}
.bignum{flex:1 1 220px}
.bignum .num{font-family:var(--font-d);font-weight:400;line-height:1;font-size:clamp(54px,9vw,124px);
  background:linear-gradient(180deg,var(--amber),var(--coral));-webkit-background-clip:text;background-clip:text;color:transparent;padding-block:.04em}
.bignum .cap{margin-top:10px;font-size:clamp(16px,1.9vw,23px);color:var(--muted);line-height:1.45;max-width:34ch}
.bridge{font-family:var(--font-d);font-size:clamp(20px,2.6vw,34px);color:var(--teal);text-transform:uppercase;letter-spacing:.04em;padding-block:.1em}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:clamp(14px,2vw,24px);margin-top:clamp(18px,2.6vh,30px)}
.statgrid .num{font-family:var(--font-d);font-size:clamp(40px,5.5vw,76px);line-height:1;
  background:linear-gradient(180deg,#fff,var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent;padding-block:.05em}

/* ===== steps / protocol ===== */
.steps{list-style:none;counter-reset:s;margin:clamp(16px,2.4vh,28px) 0 0;padding:0;display:grid;gap:clamp(12px,1.7vh,18px)}
.steps li{counter-increment:s;position:relative;padding:clamp(13px,1.6vw,20px) clamp(16px,2vw,24px) clamp(13px,1.6vw,20px) clamp(58px,6vw,76px);
  border:1px solid var(--line);border-radius:14px;background:var(--glass);font-size:clamp(17px,2vw,24px);line-height:1.4}
.steps li::before{content:counter(s);position:absolute;left:clamp(12px,1.4vw,18px);top:50%;transform:translateY(-50%);
  width:clamp(34px,3.8vw,46px);height:clamp(34px,3.8vw,46px);border-radius:12px;display:grid;place-items:center;
  font-family:var(--font-d);font-size:clamp(15px,1.8vw,22px);color:#0f1b41;background:var(--accent-c,var(--teal))}
.steps li b{color:#fff}

/* ===== two columns ===== */
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:clamp(14px,2vw,24px);margin-top:clamp(18px,2.6vh,30px)}
@media(max-width:860px){.twocol{grid-template-columns:1fr}}
.tc{padding:clamp(18px,2.2vw,28px);border-radius:18px;border:1px solid var(--line);background:var(--glass)}
.tc .tc-h{display:flex;align-items:center;gap:12px;margin:0 0 12px}
.tc .tc-h .ic{width:clamp(28px,3vw,38px);height:clamp(28px,3vw,38px);color:var(--accent-c,var(--teal));flex:none}
.tc .tc-h h4{margin:0;font-size:clamp(20px,2.4vw,28px);color:#fff}
.tc ul{list-style:none;margin:0;padding:0;display:grid;gap:10px}
.tc li{position:relative;padding-left:26px;font-size:clamp(16px,1.9vw,22px);line-height:1.4;color:var(--muted)}
.tc li::before{content:"";position:absolute;left:0;top:.6em;width:9px;height:9px;border-radius:50%;background:var(--accent-c,var(--teal))}

/* ===== big statement (driving questions / formats) ===== */
.statement{margin-top:clamp(18px,2.6vh,30px);padding:clamp(24px,3.4vw,44px);border-radius:22px;border:1px solid var(--line);
  background:linear-gradient(135deg,rgba(46,224,207,.12),rgba(31,143,214,.10));position:relative;overflow:hidden}
.statement::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,var(--teal),var(--blue))}
.statement p{margin:0;font-family:var(--font-b);font-weight:600;font-size:clamp(26px,3.7vw,48px);line-height:1.25;color:#fff}
.statement .fill{color:var(--amber);font-style:italic}

/* ===== quote ===== */
.quote-slide .inner{max-width:1080px}
.qmark{font-family:var(--font-d);font-size:clamp(70px,11vw,150px);line-height:.5;color:var(--teal);opacity:.5}
.qmark.qmark-low{line-height:1;margin-top:clamp(18px,3.5vh,40px)}
.quote{font-family:var(--font-b);font-style:italic;font-weight:500;font-size:clamp(24px,3.3vw,44px);line-height:1.35;color:#fff;margin:8px 0 0}
.attr{margin-top:clamp(16px,2.4vh,26px);font-family:var(--font-m);letter-spacing:.1em;text-transform:uppercase;color:var(--amber);font-size:clamp(14px,1.7vw,20px)}

/* ===== chips ===== */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:clamp(16px,2.4vh,26px)}
.chip{display:inline-flex;align-items:center;gap:9px;padding:11px 18px;border-radius:999px;border:1px solid var(--line);
  background:var(--glass);font-size:clamp(15px,1.8vw,21px);color:var(--fg)}
.chip .d{width:9px;height:9px;border-radius:50%;background:var(--accent-c,var(--teal));flex:none}

/* ===== checklist ===== */
.checklist{list-style:none;margin:clamp(16px,2.4vh,26px) 0 0;padding:0;display:grid;gap:12px}
.checklist li{display:flex;align-items:center;gap:14px;font-size:clamp(18px,2.2vw,26px);color:var(--fg)}
.checklist .box{width:clamp(26px,2.8vw,34px);height:clamp(26px,2.8vw,34px);border-radius:9px;border:2px solid var(--teal);display:grid;place-items:center;color:var(--teal);flex:none}
.checklist .box svg{width:64%;height:64%}

/* resource link button */
.linkrow{display:flex;flex-wrap:wrap;gap:12px;margin-top:clamp(18px,2.6vh,28px)}
.btnlink{display:inline-flex;align-items:center;gap:10px;padding:13px 22px;border-radius:12px;border:1px solid var(--line);
  background:var(--glass);color:#fff;text-decoration:none;font-weight:600;font-size:clamp(15px,1.8vw,20px);transition:all .2s}
.btnlink:hover{background:var(--glass-2);transform:translateY(-2px)}
.btnlink svg{width:18px;height:18px;color:var(--teal)}

/* ===== figures (restored original charts / tables / diagrams) ===== */
.figrow{display:grid;grid-template-columns:.92fr 1.08fr;gap:clamp(18px,3vw,40px);align-items:center;margin-top:clamp(14px,2vh,22px)}
@media(max-width:860px){.figrow{grid-template-columns:1fr}}
.figrow ul.clean{margin-top:clamp(12px,1.8vh,18px)}
.figsolo{margin:clamp(14px,2vh,22px) auto 0;max-width:min(94%,1120px)}
.figbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:clamp(9px,1.1vw,15px);
  box-shadow:0 20px 56px rgba(0,0,0,.42);position:relative}
.figbox::after{content:"";position:absolute;inset:-1px;border-radius:16px;pointer-events:none;
  box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 0 40px color-mix(in oklab,var(--accent-c,var(--teal)) 28%,transparent)}
.figbox img{display:block;width:100%;height:auto;border-radius:8px;max-height:60vh;object-fit:contain;margin:0 auto}
.figbox.multi{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.figbox.multi img{max-height:46vh}
@media(max-width:760px){.figbox.multi{grid-template-columns:1fr}}
.figsolo .figbox img{max-height:64vh}
.figcap{margin:12px 0 0;font-family:var(--font-m);font-size:clamp(12px,1.4vw,16px);letter-spacing:.04em;color:var(--muted);text-align:center}

/* ===== task / activity indicator (consistent across the deck) ===== */
:root{--task-a:#ffb43d; --task-b:#ff9d78}
.slide.is-task::before{content:"";position:absolute;left:0;top:0;bottom:0;width:clamp(8px,0.8vw,12px);
  background:linear-gradient(180deg,var(--task-a),var(--task-b));z-index:4;box-shadow:0 0 26px rgba(255,157,120,.5)}
.taskchip{display:inline-flex;align-items:center;gap:9px;margin:0 0 clamp(12px,1.8vh,18px);padding:8px 16px;border-radius:8px;
  font-family:var(--font-m);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(11px,1.35vw,16px);
  color:var(--task-a);background:rgba(255,180,61,.15);border:1px solid rgba(255,180,61,.55)}
.taskchip svg{width:clamp(15px,1.7vw,19px);height:clamp(15px,1.7vw,19px);stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ===== data tables (recreated YouthTruth tables) ===== */
.dtable{width:100%;border-collapse:collapse;margin:clamp(14px,2.2vh,24px) 0 0;border-radius:14px;overflow:hidden;border:1px solid var(--line);
  font-size:clamp(15px,1.85vw,23px)}
.dtable th,.dtable td{padding:clamp(9px,1.3vw,17px) clamp(9px,1.3vw,18px);text-align:center;border-bottom:1px solid var(--line);line-height:1.3}
.dtable thead th{background:rgba(255,255,255,.08);font-family:var(--font-m);text-transform:uppercase;letter-spacing:.05em;
  font-size:clamp(11px,1.35vw,16px);color:var(--fg)}
.dtable tbody tr:nth-child(even) td{background:rgba(255,255,255,.035)}
.dtable th:first-child,.dtable td:first-child{text-align:left;font-weight:600;color:#fff}
.dtable tbody tr:last-child td{border-bottom:none}
.dtable .hl{background:color-mix(in oklab,var(--accent-c,var(--teal)) 24%,transparent)!important;color:#fff;font-weight:700}
.dtable thead th.hl{background:color-mix(in oklab,var(--accent-c,var(--teal)) 36%,transparent)!important;color:#fff}
.dtable .dom{display:block;font-family:var(--font-m);font-size:.62em;color:var(--muted);letter-spacing:.04em;margin-top:5px;text-transform:uppercase}
.dtable.q td:first-child{font-weight:500;color:var(--fg);max-width:48ch}

/* ===== format chip (grouping cue, e.g. Whole-Group Share-Out) ===== */
.fmtchip{display:inline-flex;align-items:center;gap:9px;margin:0 0 clamp(12px,1.8vh,18px);padding:8px 16px;border-radius:8px;
  font-family:var(--font-m);font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:clamp(11px,1.35vw,16px);
  color:var(--teal);background:rgba(46,224,207,.14);border:1px solid rgba(46,224,207,.5)}
.fmtchip svg{width:clamp(15px,1.7vw,19px);height:clamp(15px,1.7vw,19px);stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chiprow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.chiprow .taskchip,.chiprow .fmtchip{margin-bottom:clamp(12px,1.8vh,18px)}

/* ===== small title icon for list slides ===== */
.titleicon{width:clamp(46px,5vw,64px);height:clamp(46px,5vw,64px);border-radius:16px;display:grid;place-items:center;margin:0 0 clamp(12px,1.8vh,18px);
  color:#0f1b41;background:var(--accent-c,var(--teal));box-shadow:0 0 28px color-mix(in oklab,var(--accent-c,var(--teal)) 50%,transparent)}
.titleicon svg{width:54%;height:54%;stroke-width:2.2}

/* ===== highlighted (focus) cards ===== */
.mini.hot{border-color:color-mix(in oklab,var(--accent-c,var(--teal)) 65%,var(--line));
  background:color-mix(in oklab,var(--accent-c,var(--teal)) 13%,var(--glass));
  box-shadow:0 0 34px color-mix(in oklab,var(--accent-c,var(--teal)) 30%,transparent)}
.mini.muted{opacity:.62}

/* ===== video card ===== */
.videocard{display:flex;align-items:center;gap:clamp(16px,2.4vw,28px);margin:clamp(16px,2.4vh,28px) auto 0;max-width:760px;
  padding:clamp(16px,2vw,26px);border-radius:18px;text-decoration:none;border:1px solid var(--line);
  background:linear-gradient(120deg,rgba(255,157,120,.16),rgba(31,143,214,.14));transition:transform .2s,box-shadow .2s}
.videocard:hover{transform:translateY(-3px);box-shadow:0 18px 50px rgba(0,0,0,.4)}
.vc-play{flex:none;width:clamp(58px,7vw,84px);height:clamp(58px,7vw,84px);border-radius:50%;display:grid;place-items:center;
  color:#0f1b41;background:linear-gradient(92deg,var(--coral),var(--orange));box-shadow:0 0 30px rgba(255,157,120,.55)}
.vc-play svg{width:42%;height:42%;margin-left:4px}
.vc-txt{display:flex;flex-direction:column;gap:6px}
.vc-txt b{font-size:clamp(19px,2.3vw,27px);color:#fff;line-height:1.2}
.vc-txt span{font-family:var(--font-m);font-size:clamp(13px,1.5vw,17px);letter-spacing:.06em;color:var(--muted);text-transform:uppercase}

/* ===== countdown timer ===== */
.timer{display:inline-flex;align-items:center;gap:clamp(12px,1.8vw,20px);margin:clamp(16px,2.4vh,26px) 0 0;
  padding:clamp(12px,1.6vw,18px) clamp(16px,2vw,24px);border-radius:16px;border:1px solid var(--line);
  background:var(--glass);backdrop-filter:blur(8px)}
.timer .t-disp{font-family:var(--font-d);font-size:clamp(34px,5vw,62px);line-height:1;padding-block:.04em;
  background:linear-gradient(180deg,#fff,var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent;min-width:2.6em;text-align:center}
.timer.run .t-disp{background:linear-gradient(180deg,#fff,var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent}
.timer.done .t-disp{background:linear-gradient(180deg,#fff,var(--coral));-webkit-background-clip:text;background-clip:text;color:transparent;animation:tflash 1s ease-in-out infinite}
@keyframes tflash{0%,100%{opacity:1}50%{opacity:.4}}
.timer .t-meta{display:flex;flex-direction:column;gap:8px}
.timer .t-label{font-family:var(--font-m);font-size:clamp(11px,1.3vw,15px);letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.timer .t-btns{display:flex;gap:8px}
.t-btn{cursor:pointer;font-family:var(--font-m);font-size:clamp(12px,1.4vw,15px);font-weight:600;letter-spacing:.04em;
  padding:8px 16px;border-radius:9px;border:1px solid var(--line);background:var(--glass-2);color:#fff;transition:all .2s}
.t-btn:hover{background:var(--teal);color:#0f1b41;border-color:var(--teal)}

/* ===== native bar charts (slide 16) ===== */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:clamp(16px,2.6vw,32px);margin-top:clamp(16px,2.4vh,26px)}
@media(max-width:760px){.charts{grid-template-columns:1fr}}
.chart{padding:clamp(16px,2vw,24px);border-radius:18px;border:1px solid var(--line);background:var(--glass)}
.chart h4{margin:0 0 clamp(12px,1.8vh,18px);font-size:clamp(16px,1.9vw,22px);color:#fff;font-weight:700}
.bars{display:flex;align-items:flex-end;gap:clamp(10px,1.6vw,20px);height:clamp(180px,30vh,300px)}
.bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:8px;height:100%}
.bar .col{width:100%;border-radius:10px 10px 0 0;background:linear-gradient(180deg,var(--bar-c),color-mix(in oklab,var(--bar-c) 60%,#0f1b41));
  display:flex;align-items:flex-start;justify-content:center;padding-top:10px;box-shadow:0 0 24px color-mix(in oklab,var(--bar-c) 35%,transparent);
  animation:grow 1s cubic-bezier(.2,.7,.2,1) both}
@keyframes grow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1)}}
.bar .val{font-family:var(--font-d);font-size:clamp(16px,2vw,26px);color:#0f1b41;padding-block:.04em}
.bar .blab{font-family:var(--font-m);font-size:clamp(11px,1.3vw,15px);color:var(--muted);text-align:center;line-height:1.2}

/* ===== dynamic hero (slide 1) ===== */
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(6deg)}}
@keyframes glowpulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.brand.shine{background:linear-gradient(92deg,#fff 0%,#bcc8e4 30%,var(--teal) 50%,#bcc8e4 70%,#fff 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 6s linear infinite}
.daybig{display:inline-block;margin-top:clamp(16px,2.4vh,26px);font-family:var(--font-d);font-weight:400;text-transform:uppercase;
  font-size:clamp(40px,5.8vw,80px);line-height:1;padding-block:.12em;letter-spacing:.01em;
  background:linear-gradient(92deg,var(--amber) 0%,var(--coral) 42%,var(--teal) 100%);background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 5s linear infinite;
  filter:drop-shadow(0 6px 22px rgba(255,157,120,.4))}
.cat-stage.live{animation:drift 7s ease-in-out infinite}
.cat-stage.live::before{animation:glowpulse 5s ease-in-out infinite}
.floatchip{position:absolute;width:clamp(40px,4.6vw,58px);height:clamp(40px,4.6vw,58px);border-radius:14px;display:grid;place-items:center;
  background:var(--glass-2);border:1px solid var(--line);color:var(--fg);backdrop-filter:blur(6px);z-index:3;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.floatchip svg{width:52%;height:52%;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.floatchip.f1{top:6%;right:10%;color:var(--amber);animation:floaty 5.5s ease-in-out infinite}
.floatchip.f2{bottom:12%;right:2%;color:var(--teal);animation:floaty 6.5s ease-in-out infinite .6s}
.floatchip.f3{bottom:4%;left:8%;color:var(--coral);animation:floaty 7s ease-in-out infinite 1.1s}

/* ===== corner brand logos (slides 73/74) ===== */
.corner-logos{position:absolute;top:clamp(14px,2.4vh,22px);right:clamp(74px,8vw,108px);z-index:5;display:flex;gap:10px}
.cmark{width:clamp(40px,4.2vw,56px);height:clamp(40px,4.2vw,56px);border-radius:13px;background:#fff;display:grid;place-items:center;padding:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.5)}
.cmark svg{width:100%;height:100%}
.titlerow{display:flex;align-items:center;gap:clamp(14px,2.2vw,28px);flex-wrap:wrap}
.titlerow h2.s{margin:0}
.tmarks{display:inline-flex;gap:clamp(10px,1.4vw,16px)}
.tmark{width:clamp(54px,7vw,92px);height:clamp(54px,7vw,92px);border-radius:18px;background:#fff;display:grid;place-items:center;padding:clamp(9px,1.1vw,15px);
  box-shadow:0 8px 24px rgba(0,0,0,.34);border:1px solid rgba(255,255,255,.5)}
.tmark svg{width:100%;height:100%}
.qrrow{display:flex;align-items:center;gap:clamp(18px,3vw,40px);flex-wrap:wrap;margin-top:clamp(16px,2.4vh,26px)}
.qrbox{flex:none;width:clamp(150px,18vw,216px);background:#fff;border-radius:18px;padding:clamp(12px,1.4vw,18px);box-shadow:0 10px 30px rgba(0,0,0,.34)}
.qrbox img{display:block;width:100%;height:auto}

/* ===== word cloud (Good Morning! theme words) ===== */
.wordle{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(8px,1.6vw,26px);
  margin-top:clamp(18px,3.2vh,38px);line-height:1.05}
.wordle span{font-family:var(--font-d);font-weight:400;text-transform:uppercase;display:inline-block;padding:.06em .12em;
  -webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3));transition:transform .3s}
.wordle span:hover{transform:scale(1.06) rotate(0deg)!important}

/* ===== need-to-know buckets ===== */
.buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,1.9vw,24px);margin-top:clamp(16px,2.4vh,28px)}
@media(max-width:760px){.buckets{grid-template-columns:1fr}}
.bucket{border-radius:18px;padding:clamp(16px,2vw,28px) clamp(12px,1.5vw,20px);background:var(--bc);color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:clamp(8px,1.4vh,16px);box-shadow:0 0 28px color-mix(in oklab,var(--bc) 38%,transparent)}
.bucket .blab{font-family:var(--font-b);font-weight:700;font-size:clamp(18px,2.3vw,28px);text-align:center;line-height:1.18}
.bucket .bq{font-family:var(--font-d);font-size:clamp(40px,6.5vw,78px);line-height:1;opacity:.92}

/* ===== question hierarchy (essential → key → sub) ===== */
.htree{margin-top:clamp(16px,2.4vh,28px);display:flex;flex-direction:column;gap:clamp(10px,1.7vh,18px)}
.htree .row{display:grid;gap:clamp(10px,1.5vw,18px)}
.htree .mids{grid-template-columns:repeat(3,1fr)}
.htree .subs{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}
@media(max-width:760px){.htree .mids{grid-template-columns:1fr}}
.htree .hbox{background:var(--accent-c,var(--green));color:#0f1b41;border-radius:14px;padding:clamp(12px,1.7vw,22px);text-align:center;
  font-family:var(--font-b);font-weight:700;font-size:clamp(15px,1.9vw,24px);box-shadow:0 6px 20px rgba(0,0,0,.26)}
.htree .top .hbox{font-family:var(--font-d);font-weight:400;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(20px,3vw,40px);padding-block:.18em}
.htree .subs .hbox{background:color-mix(in oklab,var(--accent-c,var(--green)) 66%,#0f1b41);color:#fff;font-size:clamp(13px,1.6vw,19px);font-weight:600}

/* ====== nav, counter, hint ====== */
.counter{position:fixed;left:clamp(18px,3vw,34px);bottom:clamp(16px,2.6vh,26px);z-index:60;font-family:var(--font-m);font-size:14px;color:var(--muted)}
.counter b{color:#fff}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:clamp(14px,2.4vh,24px);z-index:60;display:flex;align-items:center;gap:14px}
.nav button{width:46px;height:46px;border-radius:13px;border:1px solid var(--line);background:var(--glass);color:#fff;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:all .2s}
.nav button:hover{background:var(--glass-2)}
.nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.dots{display:flex;gap:7px;max-width:46vw;flex-wrap:wrap;justify-content:center}
.dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.28);cursor:pointer;transition:all .2s}
.dots i.on{background:var(--teal);box-shadow:0 0 10px var(--teal);transform:scale(1.3)}
.hint{position:fixed;right:clamp(18px,3vw,34px);bottom:clamp(16px,2.6vh,26px);z-index:60;font-family:var(--font-m);font-size:12px;color:var(--muted);opacity:.8}

/* ====== Mission Log menu ====== */
.menu-toggle{position:fixed;top:clamp(14px,2.4vh,22px);right:clamp(18px,3vw,34px);z-index:65;
  width:46px;height:46px;border-radius:13px;background:var(--glass);border:1px solid var(--line);
  display:grid;place-items:center;color:#fff;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
.menu-toggle:hover{background:var(--glass-2)}
.menu-toggle svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.scrim{position:fixed;inset:0;background:rgba(6,11,28,.55);opacity:0;pointer-events:none;transition:opacity .35s;z-index:69}
.scrim.show{opacity:1;pointer-events:auto}
.agenda{position:fixed;top:0;right:0;width:min(92vw,440px);height:100vh;height:100dvh;
  background:rgba(11,19,46,.97);border-left:1px solid var(--line);backdrop-filter:blur(14px);
  transform:translateX(100%);transition:transform .42s cubic-bezier(.2,.7,.2,1);z-index:70;display:flex;flex-direction:column}
.agenda.open{transform:none;box-shadow:-30px 0 80px rgba(0,0,0,.5)}
.agenda h3{margin:0;padding:26px 26px 10px;font-family:var(--font-d);font-weight:400;font-size:20px;letter-spacing:.04em;text-transform:uppercase;color:#fff;padding-block:.06em}
.agenda h3 small{display:block;font-family:var(--font-m);font-size:10px;letter-spacing:.2em;color:var(--muted);margin-top:8px;text-transform:uppercase}
.agenda .close{position:absolute;top:22px;right:20px;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--glass);color:#fff;cursor:pointer;display:grid;place-items:center}
.agenda .close svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round}
.agenda ul{list-style:none;margin:0;padding:8px 14px 26px;overflow-y:auto}
.ag-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;cursor:pointer;transition:background .18s}
.ag-item:hover{background:var(--glass)}
.ag-item.is-current{background:var(--glass-2)}
.ag-item.is-current .ag-l{color:#fff}
.ag-i{font-family:var(--font-m);font-size:12px;color:var(--teal);width:24px;flex:none}
.ag-l{font-size:15px;color:var(--muted);line-height:1.3}
</style>
</head>
<body>
<div class="stars"></div>
<div class="progress" id="progress"></div>

<main class="deck" id="deck"></main>

<button class="menu-toggle" id="menuToggle" aria-label="Open Mission Log">
  <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
</button>

<div class="counter"><b id="cnum">1</b> / <span id="ctot">1</span></div>
<nav class="nav" aria-label="Slide navigation">
  <button id="prev" aria-label="Previous slide"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
  <div class="dots" id="dots"></div>
  <button id="next" aria-label="Next slide"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
</nav>
<div class="hint">&larr; &rarr; / space &middot; &#9776; Mission Log &middot; M</div>

<div class="scrim" id="scrim"></div>
<aside class="agenda" id="agenda" aria-label="Mission Log">
  <button class="close" id="agendaClose" aria-label="Close Mission Log"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  <h3>Mission Log<small id="agendaCount"></small></h3>
  <ul id="agendaList"></ul>
</aside>

  brain:'<path d="M9.5 2a3 3 0 00-3 3 3 3 0 00-2 5 3 3 0 002 5 3 3 0 006 0V5a3 3 0 00-3-3z"/><path d="M14.5 2a3 3 0 013 3 3 3 0 012 5 3 3 0 01-2 5 3 3 0 01-6 0"/>',

/* ===== render ===== */
function linkRow(links){
  if(!links||!links.length) return '';
  const ext='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4 10 14"/><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5"/></svg>';
  return '<div class="linkrow r">'+links.map(l=>'<a class="btnlink" href="'+l.url+'" target="_blank" rel="noopener">'+ext+l.label+'</a>').join('')+'</div>';
}
function taskChip(s){ return s.task? '<span class="taskchip r">'+ic('hand')+'Activity</span>' : ''; }
function fmtChip(s){ return s.format? '<span class="fmtchip r">'+ic('users')+s.format+'</span>' : ''; }
function chipRow(s){ const c=taskChip(s)+fmtChip(s); return c? '<div class="chiprow">'+c+'</div>' : ''; }
function kickHtml(s){ return chipRow(s) + (s.kick? '<div class="kick r"><span class="dot"></span>'+s.kick+'</div>' : ''); }
function videoCard(v){ return '<a class="videocard r" href="'+v.url+'" target="_blank" rel="noopener"><span class="vc-play">'+ic('play')+'</span><span class="vc-txt"><b>'+(v.label||'Watch the video')+'</b><span>'+(v.source||'')+'</span></span></a>'; }
function timerHtml(s){ const m=s.timer; return '<div class="timer r" data-min="'+m+'"><div class="t-disp">'+String(m).padStart(2,'0')+':00</div><div class="t-meta"><span class="t-label">'+m+'-Minute Timer</span><div class="t-btns"><button class="t-btn" data-act="toggle">Start</button><button class="t-btn" data-act="reset">Reset</button></div></div></div>'; }
function head2(s){ return s.title? '<h2 class="s r">'+s.title+'</h2>' : ''; }
function headT(s){ return s.corner ? '<div class="titlerow r"><h2 class="s">'+s.title+'</h2>'+titleMarks(s.corner)+'</div>' : head2(s); }
function leadHtml(s){ return s.lead? '<p class="lead r">'+s.lead+'</p>' : ''; }
function noteHtml(s){ return s.note? '<p class="note r">'+s.note+'</p>' : ''; }
function stmtHtml(s){ return s.statement? '<div class="statement r"><p>'+s.statement+'</p></div>' : ''; }

function buildInner(s){
  const acc=s.accent||'var(--teal)';
  let h='';
  if(s.type==='title'){
    return '<div class="inner hero" style="--accent-c:'+acc+'">'+
      '<div><p class="brand shine r">'+s.brand+'</p><p class="brandsub r">'+s.sub+'</p>'+
      '<p class="meta r">'+s.meta+'</p>'+
      '<div class="daybig shine r">'+s.day+'</div>'+
      '<p class="focus r">Focus for the day: <b>'+s.focus+'</b></p></div>'+
      '<div class="cat-stage live r"><svg class="orbits" viewBox="0 0 420 420">'+
        '<g class="spin"><ellipse cx="210" cy="210" rx="180" ry="74" fill="none" stroke="rgba(46,224,207,.45)" stroke-width="1.4"/><circle cx="390" cy="210" r="6" fill="var(--teal)"/><circle cx="30" cy="210" r="4" fill="var(--teal)"/></g>'+
        '<g class="spin rev"><ellipse cx="210" cy="210" rx="120" ry="175" fill="none" stroke="rgba(255,157,120,.42)" stroke-width="1.4"/><circle cx="210" cy="35" r="5" fill="var(--coral)"/></g>'+
        '<g class="spin fast"><circle cx="210" cy="210" r="150" fill="none" stroke="rgba(255,214,107,.3)" stroke-width="1.2"/><circle cx="360" cy="210" r="4.5" fill="var(--amber)"/></g>'+
      '</svg>'+
      '<img src="../assets/inquiry-cat.png" alt="" onerror="this.style.display=\'none\'"></div>'+
      '</div>';
  }
  if(s.type==='section'){
    return '<div class="inner section-slide" style="--accent-c:'+acc+'">'+
      taskChip(s)+
      '<div class="section-ic r">'+ic(s.icon||'spark')+'</div>'+
      '<h1 class="s r">'+s.title+'</h1>'+leadHtml(s)+'</div>';
  }
  if(s.type==='table'){
    const hl=new Set(s.highlight||[]);
    const thead='<tr>'+s.headers.map((hd,c)=>'<th'+(hl.has(c)?' class="hl"':'')+'>'+hd+'</th>').join('')+'</tr>';
    const tbody=s.rows.map(r=>'<tr>'+r.map((cell,c)=>'<td'+(hl.has(c)?' class="hl"':'')+'>'+cell+'</td>').join('')+'</tr>').join('');
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s)+
      '<table class="dtable r'+(s.q?' q':'')+'"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>'+noteHtml(s);
    return h+'</div>';
  }
  if(s.type==='statement-slide'){
    return '<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s)+stmtHtml(s)+'</div>';
  }
  if(s.type==='figure'){
    const box=s.imgs
      ? '<div class="figbox multi">'+s.imgs.map(i=>'<img src="img/'+i+'.jpg" alt="">').join('')+'</div>'
      : '<div class="figbox"><img src="img/'+s.img+'.jpg" alt=""></div>';
    const cap=s.cap?'<p class="figcap">'+s.cap+'</p>':'';
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s);
    if(s.bullets){
      h+='<div class="figrow r"><div>'+leadHtml(s)+'<ul class="clean">'+s.bullets.map(b=>'<li>'+b+'</li>').join('')+'</ul>'+stmtHtml(s)+noteHtml(s)+linkRow(s.links)+'</div>'+
         '<div>'+box+cap+'</div></div>';
    }else{
      h+=leadHtml(s)+'<div class="figsolo r">'+box+cap+'</div>'+stmtHtml(s)+noteHtml(s)+linkRow(s.links);
    }
    return h+'</div>';
  }
  if(s.type==='quote'||s.type==='closing'){
    h='<div class="inner quote-slide" style="--accent-c:'+acc+'">';
    if(s.kick) h+=kickHtml(s);
    if(s.title&&s.type==='closing') h+=head2(s);
    h+='<div class="qmark'+(s.title?' qmark-low':'')+' r">&ldquo;</div><blockquote class="quote r">'+s.quote+'</blockquote>';
    if(s.attr) h+='<div class="attr r">'+s.attr+'</div>';
    if(s.qr){
      h+='<div class="qrrow r">'+linkRow(s.links).replace(' r"',' "')+'<div class="qrbox"><img src="img/'+s.qr+'" alt="Feedback QR code"></div></div>';
    } else {
      h+=linkRow(s.links);
    }
    return h+'</div>';
  }
  if(s.type==='welcome'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s);
    h+='<ul class="checklist r">'+s.checklist.map(c=>'<li><span class="box">'+ic('check')+'</span>'+c+'</li>').join('')+'</ul>';
    h+=noteHtml(s);
    if(s.chips) h+='<div class="chips r">'+s.chips.map(c=>'<span class="chip"><span class="d"></span>'+c+'</span>').join('')+'</div>';
    if(s.wordle) h+='<div class="wordle r">'+s.wordle.map(w=>'<span style="font-size:'+w.size+';transform:rotate('+w.rot+'deg);background:'+w.g+';-webkit-background-clip:text;background-clip:text;color:transparent">'+w.t+'</span>').join('')+'</div>';
    return h+'</div>';
  }
  if(s.type==='list'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s);
    if(s.icon) h+='<div class="titleicon r">'+ic(s.icon)+'</div>';
    h+=headT(s)+leadHtml(s);
    if(s.subhead) h+='<p class="tagline r">'+s.subhead+'</p>';
    if(s.bullets) h+='<ul class="clean r">'+s.bullets.map(b=>'<li>'+b+'</li>').join('')+'</ul>';
    h+=stmtHtml(s)+noteHtml(s)+linkRow(s.links);
    if(s.buckets) h+='<div class="buckets r">'+s.buckets.map(b=>'<div class="bucket" style="--bc:'+b.c+'"><span class="blab">'+b.label+'</span><span class="bq">?</span></div>').join('')+'</div>';
    if(s.video) h+=videoCard(s.video);
    if(s.timer) h+=timerHtml(s);
    return h+'</div>';
  }
  if(s.type==='hierarchy'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s)+'<div class="htree r">';
    h+='<div class="row top"><div class="hbox">'+s.top+'</div></div>';
    h+='<div class="row mids">'+s.mids.map(m=>'<div class="hbox">'+m+'</div>').join('')+'</div>';
    h+='<div class="row subs">'+s.subs.map(x=>'<div class="hbox">'+x+'</div>').join('')+'</div>';
    h+='</div>'+noteHtml(s);
    return h+'</div>';
  }
  if(s.type==='video'){
    return '<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s)+videoCard(s.video)+noteHtml(s)+'</div>';
  }
  if(s.type==='bars'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s)+'<div class="charts r">';
    s.charts.forEach(ch=>{
      const mx=Math.max.apply(null,ch.bars.map(b=>b.v));
      h+='<div class="chart">'+(ch.title?'<h4>'+ch.title+'</h4>':'')+'<div class="bars">'+ch.bars.map(b=>
        '<div class="bar"><div class="col" style="--bar-c:'+ch.color+';height:'+Math.round(b.v/mx*100)+'%"><span class="val">'+b.v+'%</span></div>'+(b.label?'<span class="blab">'+b.label+'</span>':'')+'</div>').join('')+'</div></div>';
    });
    h+='</div>'+noteHtml(s);
    return h+'</div>';
  }
  if(s.type==='cards'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+headT(s)+leadHtml(s);
    h+='<div class="grid '+(s.cols||'g3')+' r">'+s.cards.map(c=>'<div class="mini'+(c.hot?' hot':'')+(c.muted?' muted':'')+'"'+(c.c?' style="--accent-c:'+c.c+'"':'')+'>'+ic(c.icon,'ic')+'<h4>'+c.h4+'</h4>'+(c.p?'<p>'+c.p+'</p>':'')+'</div>').join('')+'</div>';
    h+=noteHtml(s)+linkRow(s.links);
    return h+'</div>';
  }
  if(s.type==='twolist'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s);
    h+='<div class="twocol r">'+s.cols.map(c=>'<div class="tc"><div class="tc-h">'+ic(c.icon,'ic')+'<h4>'+c.h4+'</h4></div><ul>'+c.items.map(i=>'<li>'+i+'</li>').join('')+'</ul></div>').join('')+'</div>';
    h+=noteHtml(s);
    if(s.timer) h+=timerHtml(s);
    return h+'</div>';
  }
  if(s.type==='protocol'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s);
    h+='<ol class="steps r">'+s.steps.map(st=>'<li>'+st+'</li>').join('')+'</ol>'+noteHtml(s);
    if(s.timer) h+=timerHtml(s);
    return h+'</div>';
  }
  if(s.type==='shift'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s);
    h+='<div class="fromto r"><div class="ft from"><div class="lab">From</div><p>'+s.from+'</p></div>'+
       '<div class="ft-arrow"><svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>'+
       '<div class="ft to"><div class="lab">To</div><p>'+s.to+'</p></div></div>';
    h+=noteHtml(s);
    if(s.tag) h+='<div class="r"><span class="tagline">&#9889; '+s.tag+'</span></div>';
    return h+'</div>';
  }
  if(s.type==='stat'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+'<div class="statrow r">';
    s.stats.forEach((st,i)=>{
      h+='<div class="bignum"><div class="num">'+st.num+'</div><div class="cap">'+st.cap+'</div></div>';
      if(s.bridge&&i<s.stats.length-1) h+='<div class="bridge">'+s.bridge+'</div>';
    });
    h+='</div>';
    return h+'</div>';
  }
  if(s.type==='statgrid'){
    h='<div class="inner" style="--accent-c:'+acc+'">'+kickHtml(s)+head2(s)+leadHtml(s);
    h+='<div class="statgrid r">'+s.nums.map(n=>'<div class="mini" style="text-align:center"><div class="num">'+n+'</div></div>').join('')+'</div>';
    return h+'</div>';
  }
  return '<div class="inner">'+head2(s)+'</div>';
}

(function(){
  // Slides that ask teams to DO something get the consistent activity indicator.
  const TASK=new Set([
    'Welcome Back!','Shuffle & Share','Shared Values Poster','Connecting the Dots',
    'Norms · Rank Order','Pairs & Shares','Inquiry Mindset','Prototype a Solution',
    'Exhibition of Learning','Now It’s Your Turn!','Swap Ingredients!','Let’s Get Started!',
    'Curriculum Mapping','How to Itemize?','Empathize by Sharing','Externships Share-Out',
    'Add Authenticity','Brain Energizer!','Looking for Links','“Recipe” Ideas',
    'Team Work Time','DQ Critique Protocol'
  ]);
  SLIDES.forEach(s=>{ if(TASK.has(s.label)) s.task=true; });

  const deck=document.getElementById('deck');
  SLIDES.forEach((s,i)=>{
    const sec=document.createElement('section');
    sec.className='slide'+(i===0?' active':'')+(s.task?' is-task':'');
    sec.style.setProperty('--accent', s.accent||'var(--teal)');
    sec.innerHTML=buildInner(s);
    deck.appendChild(sec);
  });
  const slides=[...document.querySelectorAll('.slide')];
  const dotsWrap=document.getElementById('dots');
  const progress=document.getElementById('progress');
  const cnum=document.getElementById('cnum');
  document.getElementById('ctot').textContent=slides.length;
  document.getElementById('agendaCount').textContent=slides.length+' slides · Day 4 Session';
  let cur=0;

  const agenda=document.getElementById('agenda');
  const scrim=document.getElementById('scrim');
  const agendaList=document.getElementById('agendaList');
  const agItems=[];
  slides.forEach((_,i)=>{
    const d=document.createElement('i');
    d.addEventListener('click',()=>show(i));
    dotsWrap.appendChild(d);
    const li=document.createElement('li');
    li.className='ag-item';
    li.innerHTML='<span class="ag-i">'+String(i+1).padStart(2,'0')+'</span><span class="ag-l">'+(SLIDES[i].label||('Slide '+(i+1)))+'</span>';
    li.addEventListener('click',()=>{show(i);closeMenu();});
    agendaList.appendChild(li);
    agItems.push(li);
  });
  const dots=[...dotsWrap.children];

  function show(i){
    cur=Math.max(0,Math.min(slides.length-1,i));
    slides.forEach((s,k)=>s.classList.toggle('active',k===cur));
    dots.forEach((d,k)=>d.classList.toggle('on',k===cur));
    agItems.forEach((a,k)=>a.classList.toggle('is-current',k===cur));
    const ai=agItems[cur]; if(ai) ai.scrollIntoView({block:'nearest'});
    cnum.textContent=cur+1;
    progress.style.width=((cur+1)/slides.length*100)+'%';
  }
  function openMenu(){agenda.classList.add('open');scrim.classList.add('show');}
  function closeMenu(){agenda.classList.remove('open');scrim.classList.remove('show');}
  document.getElementById('menuToggle').addEventListener('click',openMenu);
  document.getElementById('agendaClose').addEventListener('click',closeMenu);
  scrim.addEventListener('click',closeMenu);
  document.getElementById('prev').addEventListener('click',()=>show(cur-1));
  document.getElementById('next').addEventListener('click',()=>show(cur+1));

  window.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){show(cur+1);e.preventDefault();}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){show(cur-1);}
    else if(e.key==='Home'){show(0);}
    else if(e.key==='End'){show(slides.length-1);}
    else if(e.key==='m'||e.key==='M'){agenda.classList.contains('open')?closeMenu():openMenu();}
    else if(e.key==='Escape'){closeMenu();}
  });
  let x0=null;
  window.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;},{passive:true});
  window.addEventListener('touchend',e=>{
    if(x0===null) return; const dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>50){ dx<0?show(cur+1):show(cur-1); } x0=null;
  });
  // ----- countdown timers -----
  document.querySelectorAll('.timer').forEach(t=>{
    const total=parseInt(t.dataset.min,10)*60; let left=total, id=null, running=false;
    const disp=t.querySelector('.t-disp'), tog=t.querySelector('[data-act="toggle"]'), rst=t.querySelector('[data-act="reset"]');
    const fmt=s=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
    const render=()=>disp.textContent=fmt(left);
    function stop(){clearInterval(id);id=null;running=false;t.classList.remove('run');tog.textContent='Start';}
    tog.addEventListener('click',()=>{
      if(running){stop();return;}
      if(left<=0){left=total;t.classList.remove('done');}
      running=true;t.classList.add('run');t.classList.remove('done');tog.textContent='Pause';
      id=setInterval(()=>{left--;render();if(left<=0){clearInterval(id);id=null;running=false;t.classList.remove('run');t.classList.add('done');tog.textContent='Start';}},1000);
    });
    rst.addEventListener('click',()=>{stop();left=total;t.classList.remove('done');render();});
    render();
  });

  show(0);
})();
</script>
</body>
</html>
